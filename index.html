<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri-Node Medical | Secure Portal</title>
    <style>
        :root {
            --medical-blue: #0a192f;
            --action-blue: #0073e6;
            --text-gray: #a8b2d1;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--medical-blue);
            color: var(--white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Simplified Header */
        header {
            padding: 1.5rem 10%;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #00d2ff;
        }

        /* Central Login Container (Primary Focus) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: #112240;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #233554;
        }

        .login-box h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 300;
            color: var(--white);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a192f;
            border: 1px solid #233554;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--action-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #005bb5;
        }

        /* Institutional Nodes Section */
        .node-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .node-link {
            background: #112240;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: var(--text-gray);
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .node-link:hover {
            border-color: var(--action-blue);
            color: white;
        }

        .node-link h3 {
            margin: 0 0 10px 0;
            color: #00d2ff;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TRI-NODE MEDICAL</div>
    </header>

    <main class="main-container">
        <div class="login-box">
            <h2>Portal Access</h2>
            <form>
                <input type="text" placeholder="User Identification" required>
                <input type="password" placeholder="Access Key" required>
                <button type="submit" class="login-btn">Secure Login</button>
            </form>
        </div>

        <div class="node-grid">
            <a href="https://www.nih.gov" class="node-link" target="_blank">
                <h3>NIH</h3>
                <p>National Research Uplink</p>
            </a>
            <a href="https://www.cedars-sinai.org" class="node-link" target="_blank">
                <h3>Cedars-Sinai</h3>
                <p>Clinical Excellence Hub</p>
            </a>
            <a href="https://www.mayoclinic.org" class="node-link" target="_blank">
                <h3>Mayo Clinic</h3>
                <p>Diagnostic Intelligence</p>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Tri-NodeMedical.net | Protocol Status: Secure
    </footer>

</body>
</html>
